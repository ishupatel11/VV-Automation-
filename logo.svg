<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary dark-to-blue gradient for the hex background -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1" />
    </linearGradient>
    <!-- Neon blue accent gradient for the VV letters -->
    <linearGradient id="vvGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter for the VV text -->
    <filter id="vvGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Subtle rim light for the hex border -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <!-- Gold accent for the dot ornaments -->
    <linearGradient id="dotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <!-- Inner glow for the hex -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1e3a6e;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d1b2e;stop-opacity:0" />
    </radialGradient>
    <!-- Outer drop shadow -->
    <filter id="hexShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="14" flood-color="#3b82f6" flood-opacity="0.35"/>
    </filter>
    <!-- VV strong glow -->
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"  result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ══════════ OUTER HEXAGON RING ══════════ -->
  <!-- Large hex (pointed top) centered at 250,250, R=220 -->
  <polygon
    points="
      250,30
      440.5,140
      440.5,360
      250,470
      59.5,360
      59.5,140
    "
    fill="url(#hexGrad)"
    stroke="url(#rimGrad)"
    stroke-width="5"
    filter="url(#hexShadow)"
  />

  <!-- Inner radial glow overlay -->
  <polygon
    points="250,30 440.5,140 440.5,360 250,470 59.5,360 59.5,140"
    fill="url(#innerGlow)"
  />

  <!-- ══════════ CIRCUIT TRACK DETAILS ══════════ -->
  <!-- Top horizontal tick lines on the hex -->
  <line x1="170" y1="58"  x2="110" y2="58"  stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="330" y1="58"  x2="390" y2="58"  stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="110" cy="58" r="4" fill="#3b82f6" fill-opacity="0.5"/>
  <circle cx="390" cy="58" r="4" fill="#3b82f6" fill-opacity="0.5"/>

  <!-- Bottom tick detail -->
  <line x1="170" y1="442" x2="110" y2="442" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="330" y1="442" x2="390" y2="442" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="110" cy="442" r="4" fill="#3b82f6" fill-opacity="0.5"/>
  <circle cx="390" cy="442" r="4" fill="#3b82f6" fill-opacity="0.5"/>

  <!-- Left side circuit nodes -->
  <circle cx="67" cy="200" r="5" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="67" cy="300" r="5" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Right side circuit nodes -->
  <circle cx="433" cy="200" r="5" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="433" cy="300" r="5" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- ══════════ INNER THIN HEX BORDER ══════════ -->
  <polygon
    points="
      250,54
      417,155
      417,345
      250,446
      83,345
      83,155
    "
    fill="none"
    stroke="#3b82f6"
    stroke-width="1"
    stroke-opacity="0.18"
    stroke-dasharray="8 6"
  />

  <!-- ══════════ GEAR / COGS CORNER ORNAMENTS ══════════ -->
  <!-- Top-left mini gear -->
  <g transform="translate(107,107) rotate(0)">
    <circle cx="0" cy="0" r="14" fill="#0d1b2e" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.6"/>
    <circle cx="0" cy="0" r="7"  fill="#3b82f6" fill-opacity="0.5"/>
    <!-- 6 gear teeth -->
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(0)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(60)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(120)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(180)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(240)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(300)"/>
  </g>

  <!-- Top-right mini gear -->
  <g transform="translate(393,107) rotate(30)">
    <circle cx="0" cy="0" r="14" fill="#0d1b2e" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.6"/>
    <circle cx="0" cy="0" r="7"  fill="#3b82f6" fill-opacity="0.5"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(0)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(60)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(120)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(180)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(240)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(300)"/>
  </g>

  <!-- Bottom-left mini gear -->
  <g transform="translate(107,393) rotate(15)">
    <circle cx="0" cy="0" r="14" fill="#0d1b2e" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.6"/>
    <circle cx="0" cy="0" r="7"  fill="#3b82f6" fill-opacity="0.5"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(0)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(60)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(120)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(180)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(240)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(300)"/>
  </g>

  <!-- Bottom-right mini gear -->
  <g transform="translate(393,393) rotate(45)">
    <circle cx="0" cy="0" r="14" fill="#0d1b2e" stroke="#3b82f6" stroke-width="2" stroke-opacity="0.6"/>
    <circle cx="0" cy="0" r="7"  fill="#3b82f6" fill-opacity="0.5"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(0)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(60)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(120)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(180)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(240)"/>
    <rect x="-3" y="-18" width="6" height="9" rx="1" fill="#3b82f6" fill-opacity="0.7" transform="rotate(300)"/>
  </g>

  <!-- ══════════ HORIZONTAL DIVIDER LINES ══════════ -->
  <line x1="110" y1="370" x2="390" y2="370" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="130" y1="376" x2="370" y2="376" stroke="#60a5fa" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- ══════════ DOUBLE "VV" LETTERING ══════════ -->
  <!-- Glowing shadow layer (behind) -->
  <text
    x="250" y="310"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="195"
    font-weight="900"
    letter-spacing="-14"
    fill="#3b82f6"
    fill-opacity="0.25"
    filter="url(#strongGlow)"
  >VV</text>

  <!-- Main VV text -->
  <text
    x="250" y="310"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="195"
    font-weight="900"
    letter-spacing="-14"
    fill="url(#vvGrad)"
    filter="url(#vvGlow)"
  >VV</text>

  <!-- Thin white highlight stroke on top of VV -->
  <text
    x="250" y="310"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', sans-serif"
    font-size="195"
    font-weight="900"
    letter-spacing="-14"
    fill="none"
    stroke="white"
    stroke-width="1.2"
    stroke-opacity="0.15"
  >VV</text>

  <!-- ══════════ LABEL BAR ══════════ -->
  <!-- Label background pill -->
  <rect x="150" y="382" width="200" height="36" rx="18" fill="#3b82f6" fill-opacity="0.18" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.5"/>

  <!-- "AUTOMATION" label text -->
  <text
    x="250" y="406"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="16"
    font-weight="700"
    fill="#93c5fd"
    letter-spacing="5"
  >AUTOMATION</text>

  <!-- ══════════ GOLD DOT ACCENTS ══════════ -->
  <circle cx="150" cy="400" r="4" fill="url(#dotGrad)"/>
  <circle cx="350" cy="400" r="4" fill="url(#dotGrad)"/>

  <!-- ══════════ TOP TAGLINE ══════════ -->
  <text
    x="250" y="115"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="13"
    font-weight="600"
    fill="#60a5fa"
    fill-opacity="0.7"
    letter-spacing="6"
  >V . V</text>

  <!-- Decorative dot above tagline -->
  <circle cx="250" cy="80" r="5" fill="#3b82f6" fill-opacity="0.7"/>
  <circle cx="250" cy="80" r="9" fill="none" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.35"/>

</svg>